<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jennifer">
  <title>Jennifer — AI Office Manager</title>
  <link rel="manifest" href="/jennifer-manifest.json">
  <style>
    :root {
      --rose: #c9748c;
      --rose-dark: #9a3a56;
      --gold: #d4a96a;
      --bg: #0f0a0d;
      --surface: #1e1218;
      --border: #3d1f2d;
      --text: #f5e6ec;
      --muted: #8a6070;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      height: 100%; width: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    /* Full-screen layout */
    .screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 24px 48px;
      position: relative;
    }

    /* Animated background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb1 { width:300px; height:300px; background:var(--rose-dark); top:-80px; right:-60px; }
    .orb2 { width:250px; height:250px; background:var(--gold); bottom:-60px; left:-40px; }

    /* Top section */
    .top { text-align:center; z-index:1; }
    .jennifer-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-dark), var(--rose), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      box-shadow: 0 0 40px rgba(201,116,140,0.3);
    }
    .jennifer-name {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .jennifer-title { font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }

    /* Middle — mic area */
    .middle { display:flex; flex-direction:column; align-items:center; gap:24px; z-index:1; width:100%; }

    /* Waveform visualizer */
    .wave-container {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .wave-container.visible { opacity: 1; }
    .wave-bar {
      width: 5px;
      border-radius: 3px;
      background: linear-gradient(180deg, var(--rose), var(--gold));
      height: 8px;
      transition: height 0.1s;
    }
    .listening .wave-bar:nth-child(1) { animation: wave 0.9s infinite 0.0s; }
    .listening .wave-bar:nth-child(2) { animation: wave 0.9s infinite 0.1s; }
    .listening .wave-bar:nth-child(3) { animation: wave 0.9s infinite 0.2s; }
    .listening .wave-bar:nth-child(4) { animation: wave 0.9s infinite 0.3s; }
    .listening .wave-bar:nth-child(5) { animation: wave 0.9s infinite 0.2s; }
    .listening .wave-bar:nth-child(6) { animation: wave 0.9s infinite 0.1s; }
    .listening .wave-bar:nth-child(7) { animation: wave 0.9s infinite 0.0s; }
    @keyframes wave { 0%,100%{height:8px} 50%{height:42px} }

    /* Mic button */
    .mic-ring {
      position: relative;
      width: 180px; height: 180px;
    }
    .mic-ring-pulse {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--rose);
      opacity: 0;
    }
    .listening .mic-ring-pulse { animation: ring-pulse 1.5s infinite; }
    @keyframes ring-pulse {
      0%   { transform:scale(1);   opacity:0.6; }
      100% { transform:scale(1.5); opacity:0; }
    }
    #mic-btn {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-dark), var(--rose));
      border: none;
      cursor: pointer;
      font-size: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(154,58,86,0.5);
      transition: all 0.2s;
    }
    #mic-btn:active { transform: scale(0.95); }
    #mic-btn.listening {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
      box-shadow: 0 8px 40px rgba(231,76,60,0.5);
    }
    #mic-btn.thinking {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      animation: think-spin 2s linear infinite;
    }
    @keyframes think-spin { 0%{box-shadow:0 8px 40px rgba(52,73,94,0.5)} 50%{box-shadow:0 8px 60px rgba(201,116,140,0.4)} 100%{box-shadow:0 8px 40px rgba(52,73,94,0.5)} }

    /* Status text */
    #status {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      min-height: 44px;
      line-height: 1.5;
      max-width: 280px;
      transition: color 0.3s;
    }
    #status.listening { color: #e74c3c; }
    #status.thinking  { color: var(--gold); }
    #status.speaking  { color: var(--rose); }

    /* Transcript bubble */
    #transcript {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 14px;
      width: 100%;
      max-width: 340px;
      min-height: 52px;
      display: none;
      line-height: 1.5;
      color: var(--text);
    }
    #transcript.visible { display: block; }

    /* Answer bubble */
    #answer-box {
      background: linear-gradient(135deg, rgba(154,58,86,0.15), rgba(201,116,140,0.1));
      border: 1px solid var(--rose-dark);
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 14px;
      width: 100%;
      max-width: 340px;
      display: none;
      line-height: 1.7;
      color: var(--text);
      max-height: 200px;
      overflow-y: auto;
    }
    #answer-box.visible { display: block; }
    #answer-box::-webkit-scrollbar { width:4px; }
    #answer-box::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* Bottom quick actions */
    .bottom { z-index:1; width:100%; }
    .quick-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .qbtn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 10px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .qbtn:hover, .qbtn:active { border-color: var(--rose); color: var(--text); background: rgba(201,116,140,0.1); }
    .qbtn .qicon { font-size: 18px; display:block; margin-bottom:4px; }

    .bottom-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .blink {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .blink:hover { color: var(--rose); }

    /* Speaking animation on avatar */
    .jennifer-avatar.speaking {
      animation: avatar-glow 0.8s infinite alternate;
    }
    @keyframes avatar-glow {
      from { box-shadow: 0 0 20px rgba(201,116,140,0.2); }
      to   { box-shadow: 0 0 60px rgba(201,116,140,0.6); }
    }
  </style>
</head>
<body>

<div class="screen">
  <!-- Background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- Top: Jennifer identity -->
  <div class="top">
    <div class="jennifer-avatar" id="avatar">🌸</div>
    <div class="jennifer-name">Jennifer</div>
    <div class="jennifer-title">AI OFFICE MANAGER</div>
  </div>

  <!-- Middle: mic + status -->
  <div class="middle">

    <!-- Waveform (shows when listening) -->
    <div class="wave-container" id="wave">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <!-- Mic button -->
    <div class="mic-ring" id="mic-ring">
      <div class="mic-ring-pulse"></div>
      <button id="mic-btn" onclick="handleMicPress()">🎙️</button>
    </div>

    <!-- Status -->
    <div id="status">Tap to speak with Jennifer</div>

    <!-- What you said -->
    <div id="transcript"></div>

    <!-- Jennifer's answer -->
    <div id="answer-box"></div>

  </div>

  <!-- Bottom: quick actions + nav -->
  <div class="bottom">
    <div class="quick-btns">
      <div class="qbtn" onclick="askJennifer('Jennifer, give me my morning briefing')">
        <span class="qicon">☀️</span>Morning Briefing
      </div>
      <div class="qbtn" onclick="askJennifer('How many overdue invoices do we have?')">
        <span class="qicon">📄</span>Overdue Invoices
      </div>
      <div class="qbtn" onclick="askJennifer('How much revenue did we make this month?')">
        <span class="qicon">💰</span>Monthly Revenue
      </div>
      <div class="qbtn" onclick="askJennifer('Which customers owe us the most money?')">
        <span class="qicon">👥</span>Top Balances
      </div>
    </div>
    <div class="bottom-links">
      <a href="/" class="blink">← Dashboard</a>
      <a href="/office-manager" class="blink">Full Chat</a>
      <a href="/medspa-office-manager" class="blink">Med Spa</a>
    </div>
  </div>

</div>

<script>
  let isListening  = false;
  let isThinking   = false;
  let recognition  = null;
  let chatHistory  = [];
  let speaking     = false;

  const micBtn    = document.getElementById('mic-btn');
  const micRing   = document.getElementById('mic-ring');
  const statusEl  = document.getElementById('status');
  const transEl   = document.getElementById('transcript');
  const answerEl  = document.getElementById('answer-box');
  const waveEl    = document.getElementById('wave');
  const avatarEl  = document.getElementById('avatar');

  // Greet on load
  window.addEventListener('load', () => {
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    setTimeout(() => {
      setStatus(`${greeting}! Tap the mic and ask me anything.`, '');
      speak(`${greeting}! I'm Jennifer, your AI Office Manager. Tap the mic to ask me anything, or tap Morning Briefing for your daily summary.`);
    }, 600);
  });

  function setStatus(text, mode='') {
    statusEl.textContent = text;
    statusEl.className = mode;
  }

  function handleMicPress() {
    if (isThinking) return;
    if (isListening) { recognition?.stop(); return; }
    if (speaking) { speechSynthesis.cancel(); speaking=false; avatarEl.classList.remove('speaking'); }
    startListening();
  }

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert('Voice not supported on this browser. Please use Chrome or Safari.');
      return;
    }
    recognition = new SR();
    recognition.continuous = false;
    recognition.lang = 'en-US';
    recognition.interimResults = true;

    recognition.onstart = () => {
      isListening = true;
      micBtn.textContent = '⏹';
      micBtn.classList.add('listening');
      micRing.classList.add('listening');
      waveEl.classList.add('visible', 'listening');
      setStatus('Listening...', 'listening');
      transEl.textContent = '';
      transEl.classList.remove('visible');
      answerEl.classList.remove('visible');
    };

    recognition.onresult = e => {
      const interim = Array.from(e.results).map(r => r[0].transcript).join('');
      transEl.textContent = interim;
      transEl.classList.add('visible');
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.textContent = '🎙️';
      micBtn.classList.remove('listening');
      micRing.classList.remove('listening');
      waveEl.classList.remove('visible', 'listening');
      const said = transEl.textContent.trim();
      if (said) sendToJennifer(said);
      else setStatus('Tap the mic and speak', '');
    };

    recognition.onerror = () => {
      isListening = false;
      micBtn.textContent = '🎙️';
      micBtn.classList.remove('listening');
      micRing.classList.remove('listening');
      waveEl.classList.remove('visible', 'listening');
      setStatus('Could not hear you. Try again.', '');
    };

    recognition.start();
  }

  function askJennifer(question) {
    if (isThinking || isListening) return;
    if (speaking) { speechSynthesis.cancel(); speaking=false; avatarEl.classList.remove('speaking'); }
    transEl.textContent = question;
    transEl.classList.add('visible');
    answerEl.classList.remove('visible');
    sendToJennifer(question);
  }

  async function sendToJennifer(message) {
    isThinking = true;
    micBtn.textContent = '⏳';
    micBtn.classList.add('thinking');
    setStatus('Jennifer is thinking...', 'thinking');

    chatHistory.push({ role:'user', content:message });

    // Detect morning briefing intent and enrich the message
    const isBriefing = /morning\s*briefing|briefing|good morning|what.*today|today.*look|summary|overview/i.test(message);

    try {
      const endpoint = isBriefing ? '/api/morning-briefing-chat' : '/api/chat';
      const body = isBriefing
        ? { message: 'Give me a complete morning briefing — invoices, cash flow, overdue customers, and recent expenses. Be comprehensive but conversational.', history: chatHistory.slice(-6) }
        : { message, history: chatHistory.slice(-6) };

      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      const answer = data.answer || "I'm sorry, I couldn't get that information right now.";

      chatHistory.push({ role:'assistant', content:answer });
      showAnswer(answer);

    } catch(e) {
      showAnswer("I couldn't connect to the server. Please check your connection.");
    }

    isThinking = false;
    micBtn.textContent = '🎙️';
    micBtn.classList.remove('thinking');
  }

  function showAnswer(text) {
    answerEl.textContent = text;
    answerEl.classList.add('visible');
    setStatus('Tap mic to ask another question', 'speaking');
    speak(text);
  }

  function speak(text) {
    const clean = text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/#/g,'').substring(0, 600);
    const u = new SpeechSynthesisUtterance(clean);
    u.rate  = 0.92;
    u.pitch = 1.08;

    // Pick a female voice if available
    const voices = speechSynthesis.getVoices();
    const female = voices.find(v => /female|woman|samantha|karen|victoria|moira|tessa|fiona|allison|ava|susan/i.test(v.name))
                || voices.find(v => v.lang.startsWith('en'));
    if (female) u.voice = female;

    u.onstart = () => { speaking = true; avatarEl.classList.add('speaking'); setStatus('Jennifer is speaking...', 'speaking'); };
    u.onend   = () => { speaking = false; avatarEl.classList.remove('speaking'); setStatus('Tap the mic to ask another question', ''); };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }

  // Load voices (required for some browsers)
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
</html>
